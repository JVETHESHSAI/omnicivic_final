spring.application.name=omnicivic
server.port=9090

# ─── Database ─────────────────────────────────────────────────────────────────
# UPDATE the password to match your local MySQL password.
spring.datasource.url=jdbc:mysql://localhost:3306/omnicivic?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=7207
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=OmniCivicSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration-ms=86400000  

# ═══════════════════════════════════════════════════════════════════════════════
# ── EMAIL (Gmail SMTP) ─────────────────────────────────────────────────────────
# ═══════════════════════════════════════════════════════════════════════════════
#
# IMPORTANT: Your regular Gmail password WILL NOT WORK here. You MUST use a
# Google "App Password" — a special 16-character code generated for apps.
#
# How to get an App Password (one-time, ~2 minutes):
#
#   1. Go to https://myaccount.google.com/security
#   2. Under "How you sign in to Google", enable "2-Step Verification"
#      (you must complete this step or App Passwords won't be available)
#   3. After 2-Step is on, go back to https://myaccount.google.com/apppasswords
#      (or search "App passwords" in your Google Account settings)
#   4. App name: type "OmniCivic" → click Create
#   5. Google shows a 16-character password like:  abcd efgh ijkl mnop
#   6. Paste that ENTIRE string (with or without spaces) as spring.mail.password
#
# ❌ WRONG: spring.mail.password=mygmailpassword123      ← regular password fails
# ✅ RIGHT: spring.mail.password=abcd efgh ijkl mnop    ← 16-char App Password
#
# Replace your-email@gmail.com with the SAME Gmail account that generated the App Password.
# Both spring.mail.username and app.mail.from MUST match that Gmail address.
#
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lpetchi2005@gmail.com
spring.mail.password=bkkg ueis chvw yrab
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8
app.mail.from=lpetchi2005@gmail.com

# Note: if email fails for any reason (auth, network), the app keeps working —
# credentials are ALSO shown on the Super Admin screen as a backup.

# ─── Frontend URL (used in email links) ───────────────────────────────────────
app.platform.url=http://localhost:4200
app.complaints.default-eta-days=4
app.complaints.allowed-radius-meters=200

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.omnicivic=INFO
logging.level.org.springframework.security=WARN

# ─── HikariCP Connection Pool Tuning (Fix 4) ──────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=OmniCivicPool
spring.datasource.hikari.leak-detection-threshold=60000

# ─── Spring Cache (Fix 6) ─────────────────────────────────────────────────────
spring.cache.type=simple
