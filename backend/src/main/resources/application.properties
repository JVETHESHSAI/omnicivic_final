spring.application.name=omnicivic
server.port=9090

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/omnicivic?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-before-production}
app.jwt.expiration-ms=86400000

# Email
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8
app.mail.from=${MAIL_FROM:${SMTP_USERNAME:no-reply@omnicivic.local}}

# Frontend URL used in email links
app.platform.url=${APP_PLATFORM_URL:http://localhost:4200}

# Complaint defaults
app.complaints.default-eta-days=4
app.complaints.allowed-radius-meters=200

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.omnicivic=INFO
logging.level.org.springframework.security=WARN

# HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=OmniCivicPool
spring.datasource.hikari.leak-detection-threshold=60000

# Cache
spring.cache.type=simple
